name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/SnapSplit
            git pull origin main
            /home/ubuntu/SnapSplit/venv/bin/pip install -r backend/requirements.txt --quiet
            sudo systemctl daemon-reload
            sudo systemctl restart snapsplit
            echo "Deployment to EC2 complete"
            sudo systemctl status snapsplit --no-pager
